<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Share - Anonymous Sanctuary</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.2; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .animate-float { animation: float 15s linear infinite; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="transition-colors duration-500 font-sans antialiased">
    <!-- Root element for React -->
    <div id="app"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Icons Mapping for CDN usage ---
        const Icon = ({ name, className = "w-5 h-5", fill = "none" }) => {
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const CRISIS_KEYWORDS = ["suicide", "kill myself", "end my life", "don't want to live", "self harm", "die", "hopeless"];

        const MOODS = [
            { label: "Happy", icon: "smile", color: "bg-green-100 text-green-700", border: "border-green-200" },
            { label: "Sad", icon: "frown", color: "bg-rose-100 text-rose-700", border: "border-rose-200" },
            { label: "Anxious", icon: "zap", color: "bg-amber-100 text-amber-700", border: "border-amber-200" },
            { label: "Reflective", icon: "coffee", color: "bg-indigo-100 text-indigo-700", border: "border-indigo-200" },
        ];

        const THEMES = [
            { name: "Midnight Calm", class: "bg-slate-900 text-slate-100", card: "bg-slate-800 border-slate-700", input: "bg-slate-900 border-slate-700 text-white" },
            { name: "Soft Slate", class: "bg-slate-50 text-slate-900", card: "bg-white border-slate-200", input: "bg-slate-50 border-slate-100 text-slate-800" },
            { name: "Lavender Dream", class: "bg-purple-50 text-slate-900", card: "bg-white border-purple-100", input: "bg-purple-50/50 border-purple-100 text-slate-800" },
        ];

        function App() {
            const [view, setView] = useState("feed");
            const [hasAcceptedTerms, setHasAcceptedTerms] = useState(false);
            const [themeIndex, setThemeIndex] = useState(0);
            const [stories, setStories] = useState([
                { id: "1", text: "Finally found the courage to speak up about my anxiety. It feels like a weight is lifting.", mood: "Reflective", author: "User_4291", timestamp: "10:30 AM" },
                { id: "2", text: "Today was heavy, but seeing others share their stories makes me feel less alone.", mood: "Sad", author: "User_8821", timestamp: "09:15 AM" }
            ]);
            const [newStory, setNewStory] = useState("");
            const [selectedMood, setSelectedMood] = useState("");
            const [reports, setReports] = useState([]);
            const [showCrisisModal, setShowCrisisModal] = useState(false);
            const [notification, setNotification] = useState(null);

            // Re-run icon rendering whenever the UI changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, hasAcceptedTerms, themeIndex, stories, notification, showCrisisModal]);

            const currentTheme = THEMES[themeIndex];

            const notify = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(null), 3000);
            };

            const handlePost = () => {
                if (!selectedMood || !newStory.trim()) return;
                const isCrisis = CRISIS_KEYWORDS.some(k => newStory.toLowerCase().includes(k));
                if (isCrisis) setShowCrisisModal(true);

                const post = {
                    id: Date.now().toString(),
                    text: newStory,
                    mood: selectedMood,
                    author: `User_${Math.floor(Math.random() * 9000) + 1000}`,
                    timestamp: "Just now"
                };
                setStories([post, ...stories]);
                setNewStory("");
                setSelectedMood("");
                notify("Story shared safely.");
            };

            if (!hasAcceptedTerms) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                        <div className="max-w-md w-full bg-white rounded-[40px] p-10 shadow-2xl text-center">
                            <div className="w-16 h-16 bg-teal-100 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                                <Icon name="shield-check" className="w-8 h-8 text-teal-600" />
                            </div>
                            <h2 className="text-3xl font-black text-slate-900 mb-4">Safety First.</h2>
                            <p className="text-slate-600 text-sm mb-8 leading-relaxed">
                                Life Share is a peer support community, not a medical service. By entering, you agree to speak with kindness and respect.
                            </p>
                            <button 
                                onClick={() => setHasAcceptedTerms(true)}
                                className="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-lg hover:bg-teal-700 transition-all"
                            >
                                I Understand & Agree
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen transition-all duration-500 pb-32 ${currentTheme.class}`}>
                    {/* Floating Hearts Animation */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        {[...Array(6)].map((_, i) => (
                            <div key={i} className="absolute animate-float opacity-10" style={{ left: `${i * 20}%`, animationDelay: `${i * 2}s` }}>
                                <Icon name="heart" className="w-12 h-12 text-teal-400" fill="currentColor" />
                            </div>
                        ))}
                    </div>

                    <header className={`sticky top-0 z-30 p-4 border-b backdrop-blur-md flex justify-between items-center ${currentTheme.name === "Midnight Calm" ? "bg-slate-900/80 border-slate-800" : "bg-white/80 border-slate-200"}`}>
                        <h1 className="text-xl font-bold text-teal-500 flex items-center gap-2 cursor-pointer" onClick={() => setView("feed")}>
                            <Icon name="heart" className="w-5 h-5 text-teal-500" fill="currentColor" /> Life Share
                        </h1>
                        <div className="flex gap-2 relative z-50">
                            <button onClick={() => setThemeIndex((themeIndex + 1) % THEMES.length)} className="p-2 rounded-full bg-slate-500/10 hover:bg-slate-500/20 transition-all">
                                <Icon name="palette" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setView("mod")} className="p-2 rounded-full bg-slate-500/10 hover:bg-slate-500/20 transition-all">
                                <Icon name="gavel" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-8 mt-6 relative z-10">
                        {view === "feed" ? (
                            <>
                                <section className="text-center space-y-3">
                                    <h2 className="text-3xl font-bold tracking-tight">The world is loud.<br/><span className="text-teal-500">We are listening.</span></h2>
                                    <p className="opacity-60 text-sm italic font-medium">No story should end in silence.</p>
                                </section>

                                <div className={`p-6 rounded-3xl border shadow-xl transition-all ${currentTheme.card}`}>
                                    <div className="flex gap-2 mb-4 overflow-x-auto pb-2 custom-scrollbar">
                                        {MOODS.map(m => (
                                            <button 
                                                key={m.label} 
                                                onClick={() => setSelectedMood(m.label)}
                                                className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all whitespace-nowrap flex items-center gap-2 ${selectedMood === m.label ? 'bg-teal-600 border-teal-600 text-white' : 'border-slate-700/50 text-slate-400 hover:border-teal-500'}`}
                                            >
                                                <Icon name={m.icon} className="w-3 h-3" /> {m.label}
                                            </button>
                                        ))}
                                    </div>
                                    <textarea 
                                        value={newStory}
                                        onChange={(e) => setNewStory(e.target.value)}
                                        placeholder="What's on your mind? It stays anonymous..." 
                                        className={`w-full h-32 p-4 rounded-2xl outline-none border transition-all resize-none ${currentTheme.input}`}
                                    />
                                    <button onClick={handlePost} className="w-full mt-4 py-3 bg-teal-600 text-white rounded-xl font-bold hover:bg-teal-700 shadow-lg shadow-teal-500/20 active:scale-95 transition-all">Share Anonymously</button>
                                </div>

                                <div className="space-y-6">
                                    {stories.map(s => (
                                        <div key={s.id} className={`p-6 rounded-3xl border transition-all hover:scale-[1.01] ${currentTheme.card}`}>
                                            <div className="flex justify-between text-[10px] uppercase font-bold opacity-50 mb-3 tracking-widest">
                                                <span>{s.author} • {s.mood}</span>
                                                <span>{s.timestamp}</span>
                                            </div>
                                            <p className="text-lg leading-relaxed">{s.text}</p>
                                            <div className="mt-4 flex gap-2">
                                                <button className="text-xs text-teal-500 font-bold flex items-center gap-1 hover:underline">
                                                    <Icon name="message-circle" className="w-3 h-3"/> Support
                                                </button>
                                                <button onClick={() => {setReports([...reports, s]); notify("Reported to Guardians.");}} className="text-xs opacity-50 font-bold ml-auto hover:text-rose-500 hover:opacity-100 transition-all">Report</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex items-center gap-2 mb-6">
                                    <button onClick={() => setView("feed")} className="p-2 bg-slate-500/10 rounded-full"><Icon name="arrow-left"/></button>
                                    <h2 className="text-xl font-bold">Guardian Panel</h2>
                                </div>
                                {reports.length === 0 ? <p className="text-center opacity-50 py-10">No reports to review.</p> : reports.map((r, i) => (
                                    <div key={i} className="p-6 bg-rose-500/10 border border-rose-500/20 rounded-3xl">
                                        <p className="text-sm italic mb-6">"{r.text}"</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => setReports(reports.filter((_, idx) => idx !== i))} className="flex-1 py-3 bg-slate-800 rounded-xl text-xs font-bold text-white">Dismiss</button>
                                            <button onClick={() => {setStories(stories.filter(s => s.id !== r.id)); setReports(reports.filter((_, idx) => idx !== i));}} className="flex-1 py-3 bg-rose-600 rounded-xl text-xs font-bold text-white">Delete Post</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-4 z-50">
                        <div className="max-w-2xl mx-auto bg-white text-slate-900 rounded-[28px] p-4 flex items-center justify-between shadow-2xl border border-slate-200">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center animate-pulse"><Icon name="alert-circle"/></div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-tighter text-slate-400">Crisis Help</p>
                                    <p className="text-sm font-bold">Text 988 or 741741</p>
                                </div>
                            </div>
                            <button onClick={() => setShowCrisisModal(true)} className="bg-slate-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 transition-all">Find Help</button>
                        </div>
                    </footer>

                    {showCrisisModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[40px] p-10 max-w-sm w-full text-slate-900 shadow-2xl text-center">
                                <h2 className="text-2xl font-black mb-4">Stay with us.</h2>
                                <p className="text-slate-600 text-sm mb-6">You matter. Please reach out to someone who can help right now.</p>
                                <div className="space-y-2 mb-8">
                                    <div className="p-3 bg-slate-50 rounded-xl flex justify-between font-bold"><span>Lifeline</span><span className="text-teal-600">988</span></div>
                                    <div className="p-3 bg-slate-50 rounded-xl flex justify-between font-bold"><span>Crisis Text</span><span className="text-teal-600">741741</span></div>
                                </div>
                                <button onClick={() => setShowCrisisModal(false)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">I will call for help</button>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-teal-600 text-white px-8 py-3 rounded-full text-sm font-bold shadow-xl animate-bounce z-[60]">
                            {notification}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
