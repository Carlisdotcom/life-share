<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Share - Anonymous Sanctuary</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hearts travel across entire screen and only fade at edges */
        @keyframes float {
            0% { 
                transform: translate(0, 105vh) scale(0.8); 
                opacity: 0; 
            }
            5% { opacity: 0.8; } /* Quick fade in at the start */
            25% { transform: translate(15vw, 75vh) scale(1.1); }
            50% { transform: translate(-10vw, 50vh) scale(1.3); }
            75% { transform: translate(10vw, 25vh) scale(1.1); }
            95% { opacity: 0.8; } /* Stay visible until the very end */
            100% { 
                transform: translate(0, -10vh) scale(0.8); 
                opacity: 0; 
            }
        }
        
        .animate-float { 
            position: fixed;
            bottom: -10%;
            animation: float linear infinite; 
            pointer-events: none;
            z-index: 30; 
            filter: drop-shadow(0 0 8px currentColor); 
        }

        /* Doodle Animations */
        @keyframes skipRight {
            0% { left: -15%; opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { left: 115%; opacity: 0; }
        }
        @keyframes skipLeft {
            0% { right: -15%; opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.25; }
            100% { right: 115%; opacity: 0; }
        }
        @keyframes skipBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .doodle-container {
            position: fixed;
            bottom: 15%;
            pointer-events: none;
            z-index: 5;
        }
        .skip-right { animation: skipRight 40s linear infinite; left: -15%; }
        .skip-left { animation: skipLeft 45s linear infinite; right: -15%; }
        .bounce-doodle { animation: skipBounce 0.6s cubic-bezier(0.28, 0.84, 0.42, 1) infinite; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body { transition: background-color 0.5s ease, color 0.5s ease; }
        .glass-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="font-sans antialiased">
    <!-- Root element for React -->
    <div id="app"></div>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, className = "w-5 h-5", fill = "none" }) => {
            return <i data-lucide={name} className={className} style={{ fill: fill }}></i>;
        };

        const CRISIS_KEYWORDS = ["suicide", "kill myself", "end my life", "don't want to live", "self harm", "die", "hopeless"];

        const MOODS = [
            { label: "Happy", icon: "smile", color: "bg-green-100 text-green-700", border: "border-green-200" },
            { label: "Sad", icon: "frown", color: "bg-rose-100 text-rose-700", border: "border-rose-200" },
            { label: "Anxious", icon: "zap", color: "bg-amber-100 text-amber-700", border: "border-amber-200" },
            { label: "Reflective", icon: "coffee", color: "bg-indigo-100 text-indigo-700", border: "border-indigo-200" },
        ];

        const THEMES = [
            { name: "Midnight Calm", class: "bg-slate-900 text-slate-100", card: "bg-slate-800/80 border-slate-700 glass-card", input: "bg-slate-900 border-slate-700 text-white", heart: "text-rose-500/50" },
            { name: "Soft Slate", class: "bg-slate-50 text-slate-900", card: "bg-white/90 border-slate-200 glass-card", input: "bg-slate-50 border-slate-100 text-slate-800", heart: "text-rose-500/60" },
            { name: "Lavender Dream", class: "bg-purple-50 text-slate-900", card: "bg-white/90 border-purple-100 glass-card", input: "bg-purple-50/50 border-purple-100 text-slate-800", heart: "text-purple-600/50" },
            { name: "Sunrise Glow", class: "bg-amber-50 text-slate-900", card: "bg-white/90 border-amber-200 glass-card", input: "bg-amber-50/50 border-amber-200 text-slate-800", heart: "text-orange-500/50" },
            { name: "Blush Rose", class: "bg-pink-50 text-slate-900", card: "bg-white/90 border-pink-200 glass-card", input: "bg-pink-50/50 border-pink-200 text-slate-800", heart: "text-rose-600/40" },
        ];

        function App() {
            const [view, setView] = useState("feed");
            const [hasAcceptedTerms, setHasAcceptedTerms] = useState(false);
            const [themeIndex, setThemeIndex] = useState(0);
            const [stories, setStories] = useState([
                { id: "1", text: "Finally found the courage to speak up about my anxiety. It feels like a weight is lifting.", mood: "Reflective", author: "User_4291", timestamp: "10:30 AM" },
                { id: "2", text: "Today was heavy, but seeing others share their stories makes me feel less alone.", mood: "Sad", author: "User_8821", timestamp: "09:15 AM" }
            ]);
            const [newStory, setNewStory] = useState("");
            const [selectedMood, setSelectedMood] = useState("");
            const [reports, setReports] = useState([]);
            const [showCrisisModal, setShowCrisisModal] = useState(false);
            const [notification, setNotification] = useState(null);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, hasAcceptedTerms, themeIndex, stories, notification, showCrisisModal]);

            const currentTheme = THEMES[themeIndex];

            const hearts = useMemo(() => {
                return [...Array(20)].map((_, i) => ({
                    id: i,
                    left: `${(i * 5) + (Math.random() * 5)}%`,
                    delay: `${i * 0.8}s`, 
                    size: `${1.2 + Math.random() * 1.5}rem`,
                    duration: `${15 + Math.random() * 10}s` 
                }));
            }, []);

            const notify = (message) => {
                setNotification(message);
                setTimeout(() => setNotification(null), 3000);
            };

            const handlePost = () => {
                if (!selectedMood || !newStory.trim()) return;
                const isCrisis = CRISIS_KEYWORDS.some(k => newStory.toLowerCase().includes(k));
                if (isCrisis) setShowCrisisModal(true);

                const post = {
                    id: Date.now().toString(),
                    text: newStory,
                    mood: selectedMood,
                    author: `User_${Math.floor(Math.random() * 9000) + 1000}`,
                    timestamp: "Just now"
                };
                setStories([post, ...stories]);
                setNewStory("");
                setSelectedMood("");
                notify("Story shared safely.");
            };

            const BackgroundAnimations = () => (
                <>
                    {hearts.map(h => (
                        <div key={h.id} className={`animate-float ${currentTheme.heart}`} style={{ left: h.left, animationDelay: h.delay, fontSize: h.size, animationDuration: h.duration }}>
                            <Icon name="heart" className="w-full h-full" fill="currentColor" />
                        </div>
                    ))}
                    
                    <div className="doodle-container skip-right" style={{ animationDelay: '5s' }}>
                        <div className="bounce-doodle text-teal-400/20">
                            <svg width="40" height="56" viewBox="0 0 48 64" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="34" cy="12" r="10" fill="currentColor" fillOpacity="0.15"/>
                                <path d="M34 22 Q 30 30, 18 38" />
                                <circle cx="14" cy="36" r="5" />
                                <path d="M14 41 v 11" />
                                <path d="M14 44 l 4 -6" />
                                <path d="M14 44 l -5 4" />
                                <path d="M14 52 l -6 9 M14 52 l 7 8" />
                            </svg>
                        </div>
                    </div>

                    <div className="doodle-container skip-left" style={{ animationDelay: '25s' }}>
                        <div className="bounce-doodle text-rose-400/20 scale-x-[-1]">
                            <svg width="32" height="48" viewBox="0 0 48 64" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <circle cx="34" cy="12" r="10" fill="currentColor" fillOpacity="0.15"/>
                                <path d="M34 22 Q 30 30, 18 38" />
                                <circle cx="14" cy="36" r="5" />
                                <path d="M14 41 v 11" />
                                <path d="M14 44 l 4 -6" />
                                <path d="M14 44 l -5 4" />
                                <path d="M14 52 l -6 9 M14 52 l 7 8" />
                            </svg>
                        </div>
                    </div>
                </>
            );

            if (!hasAcceptedTerms) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 relative overflow-hidden text-slate-100">
                        <BackgroundAnimations />
                        <div className="max-w-md w-full bg-white rounded-[40px] p-10 shadow-2xl text-center relative z-40">
                            <div className="w-16 h-16 bg-teal-100 rounded-2xl flex items-center justify-center mb-6 mx-auto">
                                <Icon name="shield-check" className="w-8 h-8 text-teal-600" />
                            </div>
                            <h2 className="text-3xl font-black text-slate-900 mb-4">Safety First.</h2>
                            <p className="text-slate-600 text-sm mb-8 leading-relaxed">
                                Life Share is a peer support community, not a medical service. By entering, you agree to speak with kindness and respect.
                            </p>
                            <button 
                                onClick={() => setHasAcceptedTerms(true)}
                                className="w-full py-4 bg-teal-600 text-white rounded-2xl font-bold shadow-lg hover:bg-teal-700 transition-all active:scale-95"
                            >
                                I Understand & Agree
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen transition-all duration-500 pb-40 ${currentTheme.class} relative overflow-hidden`}>
                    <BackgroundAnimations />

                    <header className={`sticky top-0 z-50 p-4 border-b backdrop-blur-lg flex justify-between items-center ${currentTheme.name === "Midnight Calm" ? "bg-slate-900/80 border-slate-800" : "bg-white/80 border-slate-200"}`}>
                        <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setView("feed")}>
                            <div className="w-8 h-8 bg-teal-500 rounded-lg flex items-center justify-center group-hover:rotate-12 transition-transform">
                                <Icon name="heart" className="w-5 h-5 text-white" fill="currentColor" />
                            </div>
                            <h1 className="text-xl font-black tracking-tight text-teal-500">Life Share</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setThemeIndex((themeIndex + 1) % THEMES.length)} className="p-2.5 rounded-xl bg-slate-500/10 hover:bg-slate-500/20 transition-all">
                                <Icon name="palette" className="w-5 h-5" />
                            </button>
                            <button onClick={() => setView("mod")} className="p-2.5 rounded-xl bg-slate-500/10 hover:bg-slate-500/20 transition-all">
                                <Icon name="gavel" className="w-5 h-5" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-8 mt-6 relative z-20">
                        {view === "feed" ? (
                            <>
                                <section className="text-center space-y-3 py-6">
                                    <h2 className="text-4xl font-black tracking-tight leading-tight">
                                        The world is loud.<br/>
                                        <span className="text-teal-500 px-2 rounded-lg">We are listening.</span>
                                    </h2>
                                    <p className="opacity-50 text-sm italic font-medium">Safe. Anonymous. Peer Support.</p>
                                </section>

                                <div className={`p-8 rounded-[32px] border shadow-2xl transition-all ${currentTheme.card}`}>
                                    <div className="flex gap-2 mb-5 overflow-x-auto pb-3 custom-scrollbar">
                                        {MOODS.map(m => (
                                            <button 
                                                key={m.label} 
                                                onClick={() => setSelectedMood(m.label)}
                                                className={`px-5 py-2.5 rounded-2xl text-xs font-bold border transition-all whitespace-nowrap flex items-center gap-2 ${selectedMood === m.label ? 'bg-teal-600 border-teal-600 text-white shadow-lg shadow-teal-500/30' : 'border-slate-700/30 text-slate-400 hover:border-teal-500/50'}`}
                                            >
                                                <Icon name={m.icon} className="w-4 h-4" /> {m.label}
                                            </button>
                                        ))}
                                    </div>
                                    <textarea 
                                        value={newStory}
                                        onChange={(e) => setNewStory(e.target.value)}
                                        placeholder="What's on your heart? It stays anonymous..." 
                                        className={`w-full h-40 p-5 rounded-2xl outline-none border transition-all resize-none text-lg leading-relaxed ${currentTheme.input}`}
                                    />
                                    <button 
                                        onClick={handlePost} 
                                        className="w-full mt-6 py-4 bg-teal-600 text-white rounded-2xl font-black text-lg hover:bg-teal-700 shadow-xl shadow-teal-500/20 active:scale-[0.98] transition-all"
                                    >
                                        Release into the Sanctuary
                                    </button>
                                </div>

                                <div className="space-y-6">
                                    {stories.map(s => (
                                        <div key={s.id} className={`p-8 rounded-[32px] border transition-all hover:translate-y-[-2px] hover:shadow-xl ${currentTheme.card}`}>
                                            <div className="flex justify-between items-center text-[11px] uppercase font-black opacity-40 mb-4 tracking-widest">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-2 h-2 rounded-full bg-teal-500"></span>
                                                    {s.author} • {s.mood}
                                                </div>
                                                <span>{s.timestamp}</span>
                                            </div>
                                            <p className="text-xl leading-relaxed font-medium">{s.text}</p>
                                            <div className="mt-6 pt-6 border-t border-slate-700/10 flex justify-between items-center">
                                                <button className="px-4 py-2 rounded-xl bg-teal-500/10 text-teal-500 text-xs font-black flex items-center gap-2 hover:bg-teal-500/20 transition-all">
                                                    <Icon name="heart" className="w-3.5 h-3.5" fill="currentColor"/> Support This
                                                </button>
                                                <button onClick={() => {setReports([...reports, s]); notify("Guardian notified.");}} className="text-[10px] font-black uppercase tracking-widest opacity-30 hover:text-rose-500 hover:opacity-100 transition-all">Report</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        ) : (
                            <div className="space-y-6">
                                <div className="flex items-center gap-4 mb-8">
                                    <button onClick={() => setView("feed")} className="p-3 bg-slate-500/10 rounded-2xl hover:bg-slate-500/20 transition-all">
                                        <Icon name="arrow-left" className="w-6 h-6"/>
                                    </button>
                                    <h2 className="text-3xl font-black tracking-tight">Guardian Panel</h2>
                                </div>
                                {reports.length === 0 ? (
                                    <div className="text-center py-20 opacity-30">
                                        <Icon name="shield" className="w-16 h-16 mx-auto mb-4" />
                                        <p className="font-bold">The sanctuary is peaceful.</p>
                                    </div>
                                ) : reports.map((r, i) => (
                                    <div key={i} className="p-8 bg-rose-500/5 border border-rose-500/20 rounded-[32px] shadow-sm">
                                        <p className="text-lg italic mb-8 font-medium">"{r.text}"</p>
                                        <div className="flex gap-4">
                                            <button onClick={() => setReports(reports.filter((_, idx) => idx !== i))} className="flex-1 py-4 bg-slate-800 rounded-2xl text-xs font-black text-white hover:bg-slate-700 transition-all uppercase tracking-widest">Dismiss</button>
                                            <button onClick={() => {setStories(stories.filter(s => s.id !== r.id)); setReports(reports.filter((_, idx) => idx !== i));}} className="flex-1 py-4 bg-rose-600 rounded-2xl text-xs font-black text-white hover:bg-rose-700 transition-all uppercase tracking-widest shadow-lg shadow-rose-500/20">Remove Post</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 p-6 z-[60]">
                        <div className="max-w-2xl mx-auto bg-white/95 text-slate-900 rounded-[32px] p-5 flex items-center justify-between shadow-2xl border border-slate-200 glass-card">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center animate-pulse">
                                    <Icon name="phone" className="w-6 h-6"/>
                                </div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Emergency Support</p>
                                    <p className="text-base font-black">Call 988 or Text 741741</p>
                                </div>
                            </div>
                            <button onClick={() => setShowCrisisModal(true)} className="bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-black hover:bg-teal-600 transition-all shadow-lg">Get Help Now</button>
                        </div>
                    </footer>

                    {showCrisisModal && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                            <div className="bg-white rounded-[48px] p-12 max-w-sm w-full text-slate-900 shadow-2xl text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 right-0 h-2 bg-rose-500"></div>
                                <h2 className="text-3xl font-black mb-4">Stay with us.</h2>
                                <p className="text-slate-600 text-sm mb-8 leading-relaxed">Your voice matters and your journey isn't over. Reach out to someone who can help right now.</p>
                                <div className="space-y-3 mb-10">
                                    <div className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center font-black">
                                        <span className="text-slate-500 text-xs">988 Lifeline</span>
                                        <span className="text-teal-600 text-lg tracking-tighter">Dial 988</span>
                                    </div>
                                    <div className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center font-black">
                                        <span className="text-slate-500 text-xs">Crisis Text</span>
                                        <span className="text-teal-600 text-lg tracking-tighter">Text 741741</span>
                                    </div>
                                </div>
                                <button onClick={() => setShowCrisisModal(false)} className="w-full py-5 bg-teal-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-teal-500/20 active:scale-95 transition-all">I will reach out</button>
                            </div>
                        </div>
                    )}

                    {notification && (
                        <div className="fixed top-24 left-1/2 -translate-x-1/2 bg-teal-600 text-white px-10 py-4 rounded-full text-sm font-black shadow-2xl animate-bounce z-[70] flex items-center gap-2">
                            <Icon name="check-circle" className="w-4 h-4"/>
                            {notification}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
